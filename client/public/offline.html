<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MaintCue</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      opacity: 0.95;
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      margin-top: 2rem;
      padding: 12px 32px;
      background: white;
      color: #059669;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.2s;
      cursor: pointer;
      border: none;
    }
    .button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">[!]</div>
    <div class="title">You're Offline</div>
    <p>MaintCue needs an internet connection to load new content.</p>
    <p>Your offline changes will sync automatically when you're back online.</p>
    <button class="button" onclick="window.location.reload()">
      Try Again
    </button>
  </div>
</body>
</html>
